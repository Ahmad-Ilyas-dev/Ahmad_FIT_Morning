<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- block and inline elements -->
    <div>
        <p style="border: 1px solid black;">This is a block element.</p>
        <p style="border: 1px solid black;">This is another block element.</p>
    </div>
    <span style="border: 1px solid black;">This is an inline element.</span>
    <span style="border: 1px solid black;">This is another inline element.</span>


    <!-- block to inline elements -->
     <p style="display: inline; border: 1px solid black;">This paragraph is a block element, but it's inside an inline context.</p>

     <!-- inline to block elements -->
     <span style="display: block; border: 1px solid black;">This span is now a block element.</span>



        <!-- semantic tags for webpage, layout -->

        <!-- top most section of our webpage (title, logo, menis) -->
        <header></header>


        <!-- main content area -->
         <section class="about"></section>
         <section class="services"></section>


            <!-- footer section(last section of our webpage); copyright, menus, contact info -->
            <footer></footer>

</body>
</html>
