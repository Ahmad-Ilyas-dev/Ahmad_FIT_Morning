<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Form</title>

    <style>
        body {
            background-color: blue;
            font-family: Arial, sans-serif;
        }

        .box {
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        h2 {
            margin-top: 20px;
        }

        .form-row {
            margin-bottom: 15px;
        }

        .form-group {
            display: inline-block;
            width: 32%;
            vertical-align: top;
            margin-right: 1%;
        }

        .form-group:last-child {
            margin-right: 0;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4a6cf7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2f4fd8;
        }
    </style>

</head>
<body>

    <div class="box">
        <h1><span style="text-decoration: underline blue;">Re</span>gistration</h1>

        <form>
            <h2>Personal Details</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="number" placeholder="Enter your mobile number">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select>
                        <option hidden>Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Occupation</label>
                    <input type="text" placeholder="Enter your occupation">
                </div>
            </div>

            <h2>Identity Details</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>ID Type</label>
                    <input type="text" placeholder="Enter ID type">
                </div>

                <div class="form-group">
                    <label>ID Number</label>
                    <input type="number" placeholder="Enter ID number">
                </div>

                <div class="form-group">
                    <label>Issued Authority</label>
                    <input type="text" placeholder="Enter authority">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Issued State</label>
                    <input type="text" placeholder="Enter state">
                </div>

                <div class="form-group">
                    <label>Issued Date</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date">
                </div>
            </div>

            <button type="submit">Next →</button>
        </form>
    </div>

</body>
</html>
