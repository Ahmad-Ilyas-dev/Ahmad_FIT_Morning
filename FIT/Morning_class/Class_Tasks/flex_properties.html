<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .con{
            width: 100%;
            height: 400px;
            border: 2px red solid;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            align-content: space-around;
            gap: 0 10px;
            
        }

        .con div{
            width: 100px;
            height: 100px;
            
            background-color: cadetblue;
        }

        .con2{
            flex-grow: 1;
        }

        .con4{
            flex-grow: 2;
        }

        .con5{
            flex-grow: 3;
        }

    </style>
    

</head>
<body>
    <div class="con">
        <div class="con1">this is a sample paragraph1</div>
        <div class="con2">this is a sample paragraph2</div>
        <div class="con3">this is a sample paragraph3</div>
        <div class="con4">this is a sample paragraph4</div>
        <div class="con5">this is a sample paragraph5</div>
    </div>
</body>
</html>
