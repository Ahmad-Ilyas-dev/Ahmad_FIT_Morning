<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>

    <style>



        .box {
            position: relative;
            top: 15px;
            left: 50px;
            width: 90%;
            height: 90vh;
            border: 5px solid black;
            display: flex;
        }
        .child1 {
            width: 25%;
            height: 90vh;
            background-color: red;
        }
        .child2 {
            width: 25%;
            height: 90vh;
            background-color: blue;
        }
        .child3 {
            width: 25%;
            height: 90vh;
            background-color: yellow;
        }
        .child4 {
            width: 25%;
            height: 90vh;
            background-color: aqua;
        }
    </style>

</head>
<body>
    <div class="box">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
    </div>
</body>
</html>
