<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>

    <style>

        *{
            margin: 0;
            padding: 0;
        }
        h1{
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
            
        }
        .box {
            width: 300px;
            height: 300px;
            background-color: lightblue;
            margin: 20px;
            padding: 10px;
            border: 5px solid blue;
            display: inline-block;
            box-sizing: border-box;
            /* border-radius: 10000px; */
        }
        
        .text-box {
        
            margin: 20px;
            width: 500px;
            height: 200px;
            padding: 20px;
            box-sizing: border-box;
            background-color: lightskyblue;
            display: inline-block;
        }
        p{
            margin-top: 10px;
        }
        button{
            margin-top: 10px;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 50px;
        }
        button:hover {
            background-color: black;
            
        }
        .img-box {
            
            margin: 0px;
            display: inline-block;
            
        }
        img {
            width: 400px;
            height: 200px;
        }

        audio {
            display: block;
            margin: 20px auto;
            width: 100%;
        }

        audio::-webkit-media-controls-panel {
            background-color: aqua;
        }

        audio::-webkit-media-controls-play-button {
            background-color: blue;
            border-radius: 50%;
        }

        audio::after{
            content: hidden;
        }

        video {
            display: block;
            margin: 20px auto;
            width: 100%;
        }

    </style>
</head>
