<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        main{
            width: 100%;
            height: 100vh;
            background-color: rgb(72, 72, 233);
            position: absolute;

        }

        .box1{
            width: 100px;
            height: 100px;
            background-color: rgb(13, 13, 13);
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .box2{
            width: 100px;
            height: 100px;
            background-color: rgb(13, 13, 13);
            position: absolute;
            top: 20px;
            left: 1200px;
        }

        .box3{
            width: 100px;
            height: 100px;
            background-color: rgb(13, 13, 13);
            position: absolute;
            top: 240px;
            left: 600px;
        }

        .box4{
            width: 100px;
            height: 100px;
            background-color: rgb(13, 13, 13);
            position: absolute;
            top: 460px;
            left: 1200px;
        }

        .box5{
            width: 100px;
            height: 100px;
            background-color: rgb(13, 13, 13);
            position: absolute;
            top: 460px;
            left: 240px;
            left: 20px;
        }
       
    </style>

</head>
<body>
    <main>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    </main>
</body>
</html>
