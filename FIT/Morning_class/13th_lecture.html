<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header{
            width: 100%;
            height: 100px;
            background-color: transparent;
            border: #000 solid 2px;
            display: inline-block;
            position: fixed;
            top: 0;
            z-index: 10;
        }

        h1{
            display: inline-block;
            padding: 20px;
        }

        nav{
            display: inline-block;
        }

        nav a{
            text-decoration: none;
            color: #000;
            padding: 20px;
            transition: .5s;
        }

        nav a:hover{
            color: white;
        }

        .btn{
            /* display: block; */
            float: right;
            /* width: 100px;
            height: 30px; */
            background-color: tomato;
            padding: 10px 20px;
            position: absolute;

            top: 25px;
            right: 20px;
            text-decoration: none;
            color: #000;
            transition: .4s;
        }

        .btn:hover{
            background-color: #ffff;
            color: black;
        }

        .main1{
            margin-top: 100px;
            width: 100%;
            height: 100vh;
            background-color: rgb(72, 72, 233);
           
        }

        .main2{
            width: 100%;
            height: 100vh;
            background-color: aqua;
        }

        .main3{
            width: 100%;
            height: 100vh;
            background-color: red;
        }

        

        footer{
            width: 100%;
            height: 100px;
            background-color: rgb(13, 13, 13);
        }

    </style>

</head>
<body>
    <header>
        <h1>My Website</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
        <a href="#" class="btn">Get in touch</a>
    </header>

    <main class="main1">
        
    </main>
    <main class="main2">

    </main>
    <main class="main3">

    </main>
    <footer></footer>
</body>
</html>
