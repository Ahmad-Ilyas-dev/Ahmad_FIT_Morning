<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4th Lecture</title>
</head>

    <style>
        .heading {
            color: blue;
            text-align: center;
            font-family: Arial, sans-serif;
            text-decoration: wavy underline cyan;
        }
        p{
            color: gray;
        }
        .points li{
            list-style-type: square;
            color: green;
        }

        .input-box input{
            margin-top: 20px;
            border: none;
            border-bottom: 2px solid black;
        }

        .input-box span{
            color: red;
            font-size: 30px;
            
        }

    </style>

<body>
    <h1 class="heading">Welcome to the 4th Lecture</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Officia impedit ea labore, dolor vitae mollitia eius dolores at atque eveniet, maxime deleniti? Eligendi voluptas eos distinctio quos accusantium tempore ea.</p>

    <ul class="points">
        <li>First point</li>
        <li>Second point</li>
        <li>Third point</li>
    </ul>

    <form action="">
        <div class="input-box">   <!-- span inline container -->
            <label for="name">Name <span>*</span>:
            <input type="text" id="name" name="name">
            </label>
        </div>
        <div class="input-box">
            <label for="email">Email:
            <input type="email" id="email" name="email">
            </label>
        </div>
    </form>

</body>
</html>
