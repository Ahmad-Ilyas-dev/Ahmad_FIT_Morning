<!-- boilerplate code for html document -->
<!DOCTYPE html>
<html lang="en"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- lists -->
    <!-- un-ordered-list -->
    <ul>
        <li>Lahore</li>
        <li>Karachi</li>
        <li>Islamabad</li>
    </ul>
    <!-- ordered list -->
    <ol>
        <a href="https://en.wikipedia.org/wiki/Punjab,_Pakistan" target="_blank"><li>Punjab</li></a>
        <a href="https://en.wikipedia.org/wiki/Sindh" target="_blank"><li>Sindh</li></a>
        <a href="https://en.wikipedia.org/wiki/Islamabad" target="_blank"><li>Islamabad</li></a>
        
    </ol>
    <!-- description list -->
    <dl>

        <!-- descriptive terms and their description -->

        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheet</dd>
        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>
    <!-- nested list -->
    <ol>
        
        <li>Punjab
            <ul>
                <li>Lahore</li>
                <li>Kasur</li>
            </ul>
        </li>
        <li>Sindh
            <ul>
                <li>Karachi</li>
                <li>Hyderabad</li>
            </ul>
    </ol>
    <!-- anchor tag -->
    <a href="https://www.instagram.com/call._.me__maik" target="_blank" >Instagram</a> <br>
    <a href="https://www.youtube.com">Youtube</a>

</body>
</html>
