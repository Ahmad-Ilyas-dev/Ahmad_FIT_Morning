<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            width: 300px;
            height: 300px;
            background-color: red;
            position: relative;
            top: 100px;
            left: 300px;
            z-index: 3;
        }
        .box2 {
            width: 300px;
            height: 300px;
            background-color: green;
            position: relative;
            top: 0px;
            left: 200px;
            z-index: 2;
        }
        .box3 {
            width: 300px;
            height: 300px;
            background-color: blue;
            position: relative;
            bottom: 550px;
            left: 190px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="box1"><h1>Box 1</h1></div>
    <div class="box2"><h1>Box 2</h1></div>
    <div class="box3"><h1>Box 3</h1></div>
</body>
</html>
