<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 60%;
            margin: 50px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: green;
            margin-bottom: 30px;
        }

        label{
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        textarea{
            resize: none;
        }

        .inline{
            display: inline-block;
            margin-right: 20px;
            font-weight: normal;
        }

        .btn{
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn:hover{
            background-color: #45a049;
        }

        .home-btn{
            background-color: #007BFF;
        }

        .home-btn:hover{
            background-color: #0056b3;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Contact Form</h1>

        <form>

            <label>
                Name:
                <input type="text" required minlength="5" maxlength="20" placeholder="Enter your name">
            </label>

            <label>
                Email:
                <input type="email" required placeholder="Enter your email">
            </label>

            <label>
                Password:
                <input type="password">
            </label>

            <label>Gender:</label>
            <label class="inline">
                <input type="radio" name="gender"> Male
            </label>
            <label class="inline">
                <input type="radio" name="gender"> Female
            </label>

            <label style="margin-top:20px;">Subjects:</label>
            <label class="inline">
                <input type="checkbox"> HTML
            </label>
            <label class="inline">
                <input type="checkbox"> CSS
            </label>
            <label class="inline">
                <input type="checkbox"> JavaScript
            </label>

            <label style="margin-top:20px;">
                Select City:
                <select>
                    <option hidden>Select City</option>
                    <option>Lahore</option>
                    <option>Multan</option>
                    <option>Karachi</option>
                </select>
            </label>

            <label>
                Your Message:
                <textarea placeholder="Enter your message here" rows="4"></textarea>
            </label>

            <button type="submit" class="btn">Send</button>
            <a href="index.html">
                <button type="button" class="btn home-btn">Go Home</button>
            </a>

        </form>

    </div>

</body>
</html>
